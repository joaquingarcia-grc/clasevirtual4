<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Horario Mundial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🌍 Conversor Horario Mundial</span>
        </div>
    </nav>

    <div class="container">

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Ingresá fecha y hora (Argentina)</h5>
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Fecha</label>
                        <input type="date" id="inputFecha" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hora</label>
                        <input type="time" id="inputHora" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <button id="boton" class="btn btn-primary w-100">
                            Calcular equivalencias
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card text-center shadow-sm h-100 border-danger-subtle">
                    <div class="card-header bg-danger text-white">
                        🇪🇸 Madrid
                    </div>
                    <div class="card-body">
                        <p id="resultadoMadrid" class="card-text fs-5 fw-semibold text-secondary">--/--/---- - --:--</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center shadow-sm h-100 border-warning-subtle">
                    <div class="card-header bg-warning text-dark">
                        🇨🇳 Shanghai
                    </div>
                    <div class="card-body">
                        <p id="resultadoShanghai" class="card-text fs-5 fw-semibold text-secondary">--/--/---- - --:--</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center shadow-sm h-100 border-success-subtle">
                    <div class="card-header bg-success text-white">
                        🇺🇸 New York
                    </div>
                    <div class="card-body">
                        <p id="resultadoNY" class="card-text fs-5 fw-semibold text-secondary">--/--/---- - --:--</p>
                    </div>
                </div>
            </div>

        </div>

        <p class="text-muted small mt-4 text-center">
            Cálculo de zonas horarias basado en la base de datos IANA (tzdb) y la API Temporal de JavaScript.
        </p>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@js-temporal/polyfill/dist/index.umd.js"></script>
<script src="codigo.js"></script>

</body>
</html>
